include:
  - ./docker-compose-base.yml
# 为了确保容器使用本地修改的 `service_conf.yaml.template` 而不是镜像中自带的，
# 需要将本地的 service_conf.yaml.template 挂载到容器内
services:
  # RAGFlow CPU 版本服务
  ragflow-cpu:
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - cpu
    image: ${RAGFLOW_IMAGE}
    # MCP 服务器配置示例：
    # command:
    #   - --enable-mcpserver
    #   - --mcp-host=0.0.0.0
    #   - --mcp-port=9382
    #   - --mcp-base-url=http://127.0.0.1:9380
    #   - --mcp-script-path=/ragflow/mcp/server/server.py
    #   - --mcp-mode=self-host
    #   - --mcp-host-api-key=ragflow-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    # MCP 的可选传输标志（按需自定义）
    # Host 模式需要配合 --no-transport-streamable-http-enabled 标志使用，
    # 即 host+streamable-http 组合暂不支持
    # 以下标志默认启用，除非使用 --no-<flag> 明确禁用：
    #   - --no-transport-sse-enabled # 禁用传统 SSE 端点 (/sse 和 /messages/)
    #   - --no-transport-streamable-http-enabled # 禁用 Streamable HTTP 传输 (/mcp 端点)
    #   - --no-json-response # 在 Streamable HTTP 传输中禁用 JSON 响应模式（改用 SSE over HTTP）

    # 启动 Admin 服务器的配置示例：
    command:
      - --enable-adminserver
    ports:
      # 端口映射：宿主机端口:容器端口
      - ${SVR_WEB_HTTP_PORT}:80
      - ${SVR_WEB_HTTPS_PORT}:443
      - ${SVR_HTTP_PORT}:9380
      - ${ADMIN_SVR_HTTP_PORT}:9381
      - ${SVR_MCP_PORT}:9382 # MCP 入口端口（宿主机端口:容器端口），必须与上面 mcp-port 的值匹配
      - ${GO_HTTP_PORT}:9384
      - ${GO_ADMIN_PORT}:9383
    volumes:
      # 挂载目录：宿主机目录:容器目录
      - ./ragflow-logs:/ragflow/logs # 挂载日志目录
      # - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf # Nginx 配置文件（可选）
      # - ./nginx/proxy.conf:/etc/nginx/proxy.conf # Nginx 代理配置文件（可选）
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf # Nginx 主配置文件（可选）
      - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template # 服务配置模板
      - ./entrypoint.sh:/ragflow/entrypoint.sh # 容器启动入口脚本
      # 解决tiktoken.get_encoding("cl100k_base") 报错
      - ./tiktoken_cache/9b5ad71b2ce5302211f9c61530b329a4922fc6a4:/ragflow/9b5ad71b2ce5302211f9c61530b329a4922fc6a4
    env_file: .env
    networks:
      - ragflow
    restart: unless-stopped
    # Prometheus 指标配置：https://docs.docker.com/engine/daemon/prometheus/#create-a-prometheus-configuration
    # 如果使用 Docker Desktop，--add-host 标志是可选的。
    # 此标志确保主机的内部 IP 能被 Prometheus 容器访问
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # RAGFlow GPU 版本服务
  ragflow-gpu:
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - gpu
    image: ${RAGFLOW_IMAGE}
    # MCP 服务器配置示例：
    # command:
    #   - --enable-mcpserver
    #   - --mcp-host=0.0.0.0
    #   - --mcp-port=9382
    #   - --mcp-base-url=http://127.0.0.1:9380
    #   - --mcp-script-path=/ragflow/mcp/server/server.py
    #   - --mcp-mode=self-host
    #   - --mcp-host-api-key=ragflow-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    # MCP 的可选传输标志（按需自定义）
    # Host 模式需要配合 --no-transport-streamable-http-enabled 标志使用，
    # 即 host+streamable-http 组合暂不支持
    # 以下标志默认启用，除非使用 --no-<flag> 明确禁用：
    #   - --no-transport-sse-enabled # 禁用传统 SSE 端点 (/sse 和 /messages/)
    #   - --no-transport-streamable-http-enabled # 禁用 Streamable HTTP 传输 (/mcp 端点)
    #   - --no-json-response # 在 Streamable HTTP 传输中禁用 JSON 响应模式（改用 SSE over HTTP）

    # 启动 Admin 服务器的配置示例：
    command:
      - --enable-adminserver
    ports:
      # 端口映射：宿主机端口:容器端口
      - ${SVR_WEB_HTTP_PORT}:80
      - ${SVR_WEB_HTTPS_PORT}:443
      - ${SVR_HTTP_PORT}:9380
      - ${ADMIN_SVR_HTTP_PORT}:9381
      - ${SVR_MCP_PORT}:9382 # MCP 入口端口（宿主机端口:容器端口），必须与上面 mcp-port 的值匹配
    volumes:
      # 挂载目录：宿主机目录:容器目录
      - ./ragflow-logs:/ragflow/logs # 挂载日志目录
      # - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf # Nginx 配置文件（可选）
      # - ./nginx/proxy.conf:/etc/nginx/proxy.conf # Nginx 代理配置文件（可选）
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf # Nginx 主配置文件（可选）
      - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template # 服务配置模板
      - ./entrypoint.sh:/ragflow/entrypoint.sh # 容器启动入口脚本
      # 解决tiktoken.get_encoding("cl100k_base") 报错
      - ./tiktoken_cache/9b5ad71b2ce5302211f9c61530b329a4922fc6a4:/ragflow/9b5ad71b2ce5302211f9c61530b329a4922fc6a4
    env_file: .env
    networks:
      - ragflow
    restart: unless-stopped
    # Prometheus 指标配置：https://docs.docker.com/engine/daemon/prometheus/#create-a-prometheus-configuration
    # 如果使用 Docker Desktop，--add-host 标志是可选的。
    # 此标志确保主机的内部 IP 能被 Prometheus 容器访问
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]


